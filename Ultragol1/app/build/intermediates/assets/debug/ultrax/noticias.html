<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Noticias - ULTRAGOL</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260408">
    <link rel="stylesheet" href="noticias-styles.css?v=20260408">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6600">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>
    (function() {
        try {
            var stored = localStorage.getItem('ultragol_promo_status');
            if (stored) {
                var status = JSON.parse(stored);
                if (status.expiresAt && new Date().getTime() < status.expiresAt) {
                    document.documentElement.classList.add('ads-hidden');
                    window.promoActive = true;
                }
            }
        } catch(e) {}
    })();
    </script>
</head>
<body>
    <div class="nt-app">

        <!-- HEADER -->
        <header class="nt-header">
            <button class="nt-back" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="nt-header-title">
                <span class="nt-header-label">ULTRAGOL</span>
                <span class="nt-header-sub">Noticias</span>
            </div>
            <button class="nt-share" onclick="shareApp ? shareApp() : navigator.share && navigator.share({title:'UltraGol',url:location.href})">
                <i class="fas fa-share-alt"></i>
            </button>
        </header>

        <!-- LEAGUE CHIPS -->
        <div class="nt-chips-wrap">
            <div class="nt-chips" id="leagueChips">
                <button class="nt-chip active" onclick="selectLeague('Liga MX', this)" data-bg="linear-gradient(135deg,#c41e3a,#ff4500)">
                    <i class="fas fa-futbol"></i> Liga MX
                </button>
                <button class="nt-chip" onclick="selectLeague('Premier League', this)" data-bg="linear-gradient(135deg,#3C1053,#AD1457)">
                    <i class="fas fa-futbol"></i> Premier
                </button>
                <button class="nt-chip" onclick="selectLeague('La Liga', this)" data-bg="linear-gradient(135deg,#ff4500,#ffd700)">
                    <i class="fas fa-futbol"></i> La Liga
                </button>
                <button class="nt-chip" onclick="selectLeague('Serie A', this)" data-bg="linear-gradient(135deg,#0082CA,#00A0E3)">
                    <i class="fas fa-futbol"></i> Serie A
                </button>
                <button class="nt-chip" onclick="selectLeague('Bundesliga', this)" data-bg="linear-gradient(135deg,#D20515,#1a1a1a)">
                    <i class="fas fa-futbol"></i> Bundesliga
                </button>
                <button class="nt-chip" onclick="selectLeague('Ligue 1', this)" data-bg="linear-gradient(135deg,#0055A5,#FF6B35)">
                    <i class="fas fa-futbol"></i> Ligue 1
                </button>
            </div>
        </div>

        <!-- MAIN SCROLL -->
        <main class="nt-main" id="ntMain">
            <!-- Hero featured -->
            <div id="featuredNews"></div>
            <!-- News list -->
            <div id="newsGrid" class="nt-list">
                <div class="nt-loading"><i class="fas fa-circle-notch fa-spin"></i> Cargando noticias...</div>
            </div>
        </main>
    </div>

    <!-- NEWS MODAL -->
    <div id="newsModal" class="nt-modal">
        <div class="nt-modal-inner">
            <div class="nt-modal-header">
                <button class="nt-modal-close" onclick="closeNewsModal()">
                    <i class="fas fa-times"></i>
                </button>
                <div class="nt-modal-meta-top">
                    <span id="newsModalSource" class="nt-modal-source"></span>
                    <span id="newsModalDate" class="nt-modal-date"></span>
                </div>
            </div>
            <div class="nt-modal-body">
                <img id="newsModalImage" src="" alt="" class="nt-modal-img">
                <h1 id="newsModalTitle" class="nt-modal-title"></h1>
                <div id="newsModalText" class="nt-modal-text"></div>
                <a id="newsOriginalLink" href="#" target="_blank" class="nt-source-btn">
                    <i class="fas fa-external-link-alt"></i> Ver artículo original
                </a>
            </div>
        </div>
    </div>

    <div id="ntToast" class="nt-toast"></div>

    <script src="noticias.js?v=20260408"></script>
</body>
</html>
